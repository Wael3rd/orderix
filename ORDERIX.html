<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orderix</title>
    <style>
        /* Layout styling - Natural document flow */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
        }

        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: row;
            background-color: #f4f4f9; 
        }
        
        #sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            box-sizing: border-box;
            width: 100%;
        }

        /* Sidebar UI */
        #sidebar h3 { margin: 0 0 10px 0; border-bottom: 1px solid #555; padding-bottom: 5px; font-size: 1.2rem;}
        .day-btn {
            background-color: #495057;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            text-align: left;
            transition: background 0.2s;
            font-size: 1rem;
        }
        .day-btn:hover { background-color: #6c757d; }
        .day-btn.active { background-color: #007bff; font-weight: bold; border-left: 5px solid #80bdff; }
        
        .settings-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; }
        .settings-group label { font-size: 0.9rem; margin-top: 5px; }
        .settings-group input { padding: 8px; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }

        /* Game UI */
        #game-board { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin: 20px 0; 
            justify-content: center; 
            width: 100%; 
            max-width: 900px;
            min-height: 80px; 
        }
        
        .item { 
            position: relative; 
            width: 60px; 
            height: 60px; 
            background-color: #007bff; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.1s, border 0.1s; 
            user-select: none; 
            flex-shrink: 0; 
        }
        .item.selected { box-shadow: 0 0 0 4px #28a745; }
        .item.error { box-shadow: 0 0 0 4px #dc3545 !important; }

        .badge { 
            position: absolute; 
            top: -10px; 
            right: -10px; 
            background: #28a745; 
            color: white; 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 14px; 
            pointer-events: none; 
            z-index: 10; 
        }
        .badge.error { background: #dc3545 !important; }
        
        .hidden { display: none !important; }
        #timer-display { font-size: 3rem; font-weight: bold; color: #333; margin: 10px 0; }
        
        #button-container {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn { 
            padding: 12px 20px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 5px; 
            background-color: #28a745; 
            color: white; 
            font-weight: bold;
        }
        .action-btn:hover { background-color: #218838; }
        #menu-btn { background-color: #6c757d; }
        #menu-btn:hover { background-color: #5a6268; }
        
        h1 { font-size: 1.8rem; text-align: center; margin: 0 0 10px 0; color: #333; }
        #level-title { font-size: 1.2rem; font-weight: bold; color: #555; margin: 0 0 10px 0; text-align: center; }
        #result { font-size: 1.3rem; font-weight: bold; min-height: 40px; text-align: center; margin-top: 10px; padding: 0 10px; }
        
        /* Generators styling */
        .dots-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 3px; 
            padding: 5px; 
            width: 100%; 
            height: 100%; 
            box-sizing: border-box; 
            align-content: flex-start; 
            justify-content: center; 
        }
        .dot { width: 8px; height: 8px; background: white; border-radius: 50%; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; padding: 15px; }
            #day-buttons-container { flex-direction: row !important; flex-wrap: wrap; justify-content: center; }
            .day-btn { flex: 1 1 calc(33% - 10px); text-align: center; font-size: 0.9rem; padding: 8px; }
            .main-content { padding-top: 20px; }
            .item { width: 45px; height: 45px; }
            #game-board { gap: 12px; }
            h1 { font-size: 1.4rem; }
            #level-title { font-size: 1rem; }
            #timer-display { font-size: 2.5rem; }
            .action-btn { font-size: 1rem; padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Paramètres</h3>
        <div class="settings-group">
            <label>Pseudo :</label>
            <div id="name-input-container" style="display: flex; gap: 5px;">
                <input type="text" id="player-name-main" placeholder="Votre nom" maxlength="15" style="flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <button id="verify-name-btn" style="cursor: pointer; padding: 8px; border: none; background: #007bff; color: white; border-radius: 4px; font-weight: bold;">Valider</button>
            </div>
            <div id="locked-name-display" class="hidden" style="padding: 8px; background: #28a745; color: white; border-radius: 4px; font-weight: bold; text-align: center;"></div>
            <div id="name-status" style="font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;"></div>
            
            <label for="item-count" style="margin-top: 5px;">Nombre d'éléments (5-20) :</label>
            <input type="number" id="item-count" min="5" max="20" value="10" style="padding: 8px; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc;">
        </div>

        <h3>Jours (Mini-jeux)</h3>
        <div id="day-buttons-container" style="display: flex; flex-direction: column; gap: 8px;">
            </div>
    </div>

    <div class="main-content">
        <h1>ORDERIX : LE TRI C'EST LA VIE !</h1>
        <h2 id="level-title">Sélectionnez un jour pour commencer</h2>
        
        <div id="timer-display">0.000</div>
        
        <div id="button-container">
            <button id="start-btn" class="action-btn hidden">Démarrer</button>
            <button id="check-btn" class="action-btn hidden">Valider l'ordre</button>
            <button id="menu-btn" class="action-btn hidden">Fermer le niveau</button>
        </div>
        
        <div id="game-board" class="hidden"></div>
        <div id="result"></div>
        
        <div id="leaderboard-section" class="hidden" style="margin-top: 20px; text-align: center; width: 100%; max-width: 400px;">
            <div id="db-message" style="margin-top: 10px; font-weight: bold;"></div>
            <h3 id="leaderboard-title" style="margin-top: 20px;">Top 10 - Classement</h3>
            <ul id="leaderboard-list" style="list-style-type: none; padding: 0; text-align: left; background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <li style="padding: 10px; text-align: center;">Chargement...</li>
            </ul>
        </div>
    </div>

    <script>
        // Google Apps Script Web App URL - REPLACE THIS BEFORE PUBLISHING
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwdBn3nmfJzB-uNlGGQ2_u5-6hqRy4urDKOWRTQWmclVwnmjE5NCE8TYPu6Saelwu_y6g/exec"; 

        // Game state variables
        let timerInterval, lastTime;
        let timeElapsed = 0;
        let selectionOrder = [];
        let isPaused = false;
        let currentDayConfig = null;
        let activeItemCount = 10;
        let isNameValid = false;

        // 7 Days configuration
        const DAYS = [
            { id: 1, title: "Jour 1 : Luminosité (Sombre à Clair)", type: "lightness" },
            { id: 2, title: "Jour 2 : Largeur (Étroit à Large)", type: "length" },
            { id: 3, title: "Jour 3 : Points (Peu à Beaucoup)", type: "dots" },
            { id: 4, title: "Jour 4 : Arrondi (Carré à Cercle)", type: "radius" },
            { id: 5, title: "Jour 5 : Opacité (Transparent à Opaque)", type: "opacity" },
            { id: 6, title: "Jour 6 : Saturation (Terne à Vif)", type: "saturation" },
            { id: 7, title: "Jour 7 : Taille (Petit à Grand)", type: "scale" }
        ];

        // DOM Cache
        const sidebar = document.getElementById('sidebar');
        const board = document.getElementById('game-board');
        const timerDisplay = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        const checkBtn = document.getElementById('check-btn');
        const menuBtn = document.getElementById('menu-btn');
        const resultDisplay = document.getElementById('result');
        const levelTitle = document.getElementById('level-title');
        const dayButtonsContainer = document.getElementById('day-buttons-container');
        const itemCountInput = document.getElementById('item-count');
        
        const playerNameMainInput = document.getElementById('player-name-main');
        const verifyNameBtn = document.getElementById('verify-name-btn');
        const nameStatus = document.getElementById('name-status');
        const nameInputContainer = document.getElementById('name-input-container');
        const lockedNameDisplay = document.getElementById('locked-name-display');
        
        const leaderboardSection = document.getElementById('leaderboard-section');
        const dbMessage = document.getElementById('db-message');
        const leaderboardList = document.getElementById('leaderboard-list');
        const leaderboardTitle = document.getElementById('leaderboard-title');

        // Storage Helpers (LocalStorage + Secure Cookies)
        function setStorage(key, value) {
            try { localStorage.setItem(key, value); } catch(e){}
            document.cookie = `${key}=${encodeURIComponent(value)}; max-age=31536000; path=/; SameSite=None; Secure`;
        }
        function getStorage(key) {
            try { if (localStorage.getItem(key)) return localStorage.getItem(key); } catch(e){}
            const match = document.cookie.match(new RegExp('(^| )' + key + '=([^;]+)'));
            if (match) return decodeURIComponent(match[2]);
            return null;
        }

        // Load saved name and lock UI immediately
        const savedName = getStorage('orderix_player_name');
        if (savedName) {
            isNameValid = true;
            if (nameInputContainer) nameInputContainer.classList.add('hidden');
            if (nameStatus) nameStatus.classList.add('hidden');
            if (lockedNameDisplay) {
                lockedNameDisplay.textContent = savedName;
                lockedNameDisplay.classList.remove('hidden');
            }
        }

        // Initialize Sidebar
        function initSidebar() {
            DAYS.forEach(day => {
                const btn = document.createElement('button');
                btn.className = 'day-btn';
                btn.textContent = `Jour ${day.id}`;
                btn.addEventListener('click', () => selectDay(day, btn));
                dayButtonsContainer.appendChild(btn);
            });
        }
        initSidebar();

        // Event Listeners
        startBtn.addEventListener('click', startGame);
        checkBtn.addEventListener('click', verifyOrder);
        menuBtn.addEventListener('click', returnToMenu);
        verifyNameBtn.addEventListener('click', verifyPlayerName);
        
        // Verify Name Logic (API Call)
        function verifyPlayerName() {
            const name = playerNameMainInput.value.trim();
            if (name.length < 3) {
                nameStatus.textContent = "3 caractères minimum.";
                nameStatus.style.color = "#dc3545";
                isNameValid = false;
                return;
            }
            
            // Auto-lock if the user types their already saved name
            if (name === getStorage('orderix_player_name')) {
                isNameValid = true;
                nameInputContainer.classList.add('hidden');
                nameStatus.classList.add('hidden');
                lockedNameDisplay.textContent = name;
                lockedNameDisplay.classList.remove('hidden');
                return;
            }
            
            nameStatus.textContent = "Vérification...";
            nameStatus.style.color = "#333";
            verifyNameBtn.disabled = true;

            fetch(`${GAS_URL}?checkName=${encodeURIComponent(name)}`)
                .then(r => r.json())
                .then(data => {
                    verifyNameBtn.disabled = false;
                    if (data.available) {
                        isNameValid = true;
                        setStorage('orderix_player_name', name);
                        nameInputContainer.classList.add('hidden');
                        nameStatus.classList.add('hidden');
                        lockedNameDisplay.textContent = name;
                        lockedNameDisplay.classList.remove('hidden');
                    } else {
                        isNameValid = false;
                        nameStatus.textContent = data.reason;
                        nameStatus.style.color = "#dc3545";
                    }
                })
                .catch(err => {
                    verifyNameBtn.disabled = false;
                    nameStatus.textContent = "Erreur réseau.";
                    nameStatus.style.color = "#dc3545";
                });
        }

        // Clear current game and reset to default view
        function returnToMenu() {
            sidebar.classList.remove('hidden'); 
            menuBtn.classList.add('hidden');
            startBtn.classList.add('hidden');
            checkBtn.classList.add('hidden');
            board.classList.add('hidden');
            leaderboardSection.classList.add('hidden'); 
            
            clearInterval(timerInterval);
            timeElapsed = 0;
            timerDisplay.textContent = '0.000';
            timerDisplay.style.color = '#333';
            resultDisplay.textContent = '';
            dbMessage.textContent = '';
            levelTitle.textContent = 'Sélectionnez un jour pour commencer';
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            currentDayConfig = null;
        }

        // Day selection & Check if already played
        function selectDay(day, btnElement) {
            sidebar.classList.add('hidden'); 
            menuBtn.classList.remove('hidden');
            leaderboardSection.classList.add('hidden'); 

            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            clearInterval(timerInterval);
            timeElapsed = 0;
            timerDisplay.textContent = '0.000';
            timerDisplay.style.color = '#333';
            board.classList.add('hidden');
            checkBtn.classList.add('hidden');
            resultDisplay.textContent = '';
            dbMessage.textContent = '';
            
            currentDayConfig = day;
            levelTitle.textContent = day.title;
            
            let playedInfo = null;
            try {
                const playedDays = JSON.parse(getStorage('orderix_played_days') || '{}');
                playedInfo = playedDays[day.id];
            } catch(e){}

            if (playedInfo) {
                // LEVEL ALREADY PLAYED
                startBtn.classList.add('hidden');
                activeItemCount = playedInfo.count;
                leaderboardTitle.textContent = `Top 10 - ${day.title} (${activeItemCount} éléments)`;
                
                resultDisplay.innerHTML = `Niveau déjà complété.<br>Votre temps : ${playedInfo.isWin ? (playedInfo.time/1000).toFixed(3) + 's' : 'FAIL'}`;
                resultDisplay.style.color = playedInfo.isWin ? '#28a745' : '#dc3545';
                
                board.innerHTML = '';
                board.classList.remove('hidden');
                board.style.flexDirection = 'column';
                board.style.alignItems = 'center';

                const solTitle = document.createElement('h3');
                solTitle.textContent = 'Solution :';
                solTitle.style.margin = '0 0 10px 0';
                board.appendChild(solTitle);

                const solRow = document.createElement('div');
                solRow.style.display = 'flex';
                solRow.style.gap = '20px';
                solRow.style.flexWrap = 'wrap';
                solRow.style.justifyContent = 'center';

                const values = generateValues(day.type, activeItemCount).sort((a, b) => a - b);
                values.forEach((val, index) => {
                    const item = document.createElement('div');
                    item.className = `item type-${day.type} selected`; 
                    applyStyle(item, day.type, val);
                    const badge = document.createElement('div');
                    badge.className = 'badge';
                    badge.textContent = index + 1;
                    item.appendChild(badge);
                    solRow.appendChild(item);
                });
                board.appendChild(solRow);

                leaderboardSection.classList.remove('hidden');
                fetchLeaderboard();
            } else {
                // LEVEL NOT PLAYED YET
                startBtn.classList.remove('hidden');
                startBtn.textContent = 'Démarrer';
                let inputVal = parseInt(itemCountInput.value);
                activeItemCount = (inputVal >= 5 && inputVal <= 20) ? inputVal : 10;
                leaderboardTitle.textContent = `Top 10 - ${day.title} (${activeItemCount} éléments)`;
            }
        }

        // Generate challenge values
        function generateValues(type, count) {
            let vals = [];
            for(let i = 0; i < count; i++) {
                if (type === 'lightness') vals.push(20 + i * 4);
                else if (type === 'length') vals.push(30 + i * 7.5);
                else if (type === 'dots') vals.push(2 + i * 1);
                else if (type === 'radius') vals.push(0 + i * 2.5);
                else if (type === 'opacity') vals.push(0.2 + i * 0.05);
                else if (type === 'saturation') vals.push(10 + i * 4);
                else if (type === 'scale') vals.push(0.4 + i * 0.05);
            }
            return vals;
        }

        // Initialize game session
        function startGame() {
            if (!isNameValid) {
                alert("Veuillez valider un pseudo disponible dans les paramètres avant de jouer.");
                returnToMenu();
                return;
            }

            let inputVal = parseInt(itemCountInput.value);
            activeItemCount = (inputVal >= 5 && inputVal <= 20) ? inputVal : 10;
            leaderboardTitle.textContent = `Top 10 - ${currentDayConfig.title} (${activeItemCount} éléments)`;
            
            timeElapsed = 0;
            isPaused = false;
            selectionOrder = [];
            resultDisplay.textContent = '';
            leaderboardSection.classList.add('hidden');
            
            startBtn.classList.add('hidden');
            checkBtn.classList.remove('hidden');
            
            board.classList.remove('hidden');
            board.style.flexDirection = 'row';
            board.style.alignItems = 'flex-start';
            board.innerHTML = '';
            
            timerDisplay.style.color = '#333';
            
            const values = generateValues(currentDayConfig.type, activeItemCount);
            let shuffled = [...values].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(val => {
                const item = document.createElement('div');
                item.className = `item type-${currentDayConfig.type}`;
                item.dataset.value = val;
                
                applyStyle(item, currentDayConfig.type, val);
                
                item.addEventListener('click', () => {
                    if(!isPaused) handleSelection(item);
                });
                board.appendChild(item);
            });

            clearInterval(timerInterval);
            lastTime = Date.now();
            timerInterval = setInterval(gameTick, 10); // Run frequently for ms precision
        }

        // Timer increment
        function gameTick() {
            if (isPaused) {
                lastTime = Date.now();
                return;
            }
            const now = Date.now();
            timeElapsed += (now - lastTime);
            lastTime = now;
            timerDisplay.textContent = (timeElapsed / 1000).toFixed(3);
        }

        // Apply dynamic styles
        function applyStyle(el, type, val) {
            if (type === 'lightness') el.style.backgroundColor = `hsl(210, 80%, ${val}%)`;
            else if (type === 'length') el.style.width = `${val}px`;
            else if (type === 'dots') {
                const cont = document.createElement('div');
                cont.className = 'dots-container';
                for(let i = 0; i < val; i++) {
                    const d = document.createElement('div');
                    d.className = 'dot';
                    cont.appendChild(d);
                }
                el.appendChild(cont);
            }
            else if (type === 'radius') el.style.borderRadius = `${val}%`;
            else if (type === 'opacity') el.style.opacity = val;
            else if (type === 'saturation') el.style.backgroundColor = `hsl(350, ${val}%, 50%)`;
            else if (type === 'scale') el.style.transform = `scale(${val})`;
        }

        // Handle item clicks
        function handleSelection(item) {
            const index = selectionOrder.indexOf(item);
            if (index > -1) {
                selectionOrder.splice(index, 1);
                item.classList.remove('selected');
            } else {
                if (selectionOrder.length >= activeItemCount) return;
                selectionOrder.push(item);
                item.classList.add('selected');
            }
            renderBadges();
        }

        // Update numbering UI
        function renderBadges() {
            document.querySelectorAll('.badge').forEach(b => b.remove());
            selectionOrder.forEach((item, index) => {
                const badge = document.createElement('div');
                badge.className = 'badge';
                badge.textContent = index + 1;
                item.appendChild(badge);
            });
        }

        // Check logic and UI response
        function verifyOrder() {
            if (isPaused) return;

            if (selectionOrder.length < activeItemCount) {
                resultDisplay.textContent = `Sélectionnez les ${activeItemCount} éléments d'abord.`;
                resultDisplay.style.color = '#ff9800';
                setTimeout(() => { if(!isPaused) resultDisplay.textContent = ''; }, 1500);
                return;
            }

            const values = selectionOrder.map(el => parseFloat(el.dataset.value));
            const sortedValues = [...values].sort((a, b) => a - b);
            const isCorrect = values.every((val, i) => val === sortedValues[i]);

            if (isCorrect) {
                endGame(`Bravo ! Jour terminé.`, true);
            } else {
                isPaused = true;
                clearInterval(timerInterval);
                timerDisplay.textContent = "FAIL";
                timerDisplay.style.color = '#dc3545';
                
                board.innerHTML = '';
                board.style.flexDirection = 'column';
                board.style.alignItems = 'center';

                // Player response section
                const userTitle = document.createElement('h3');
                userTitle.textContent = 'Votre réponse :';
                userTitle.style.margin = '0 0 10px 0';
                board.appendChild(userTitle);

                const userRow = document.createElement('div');
                userRow.style.display = 'flex';
                userRow.style.gap = '20px';
                userRow.style.flexWrap = 'wrap';
                userRow.style.justifyContent = 'center';
                userRow.style.marginBottom = '30px';

                selectionOrder.forEach((item, index) => {
                    const clone = item.cloneNode(true);
                    const expectedVal = sortedValues[index];
                    const actualVal = parseFloat(clone.dataset.value);
                    
                    if (actualVal !== expectedVal) {
                        clone.classList.add('error');
                        const badge = clone.querySelector('.badge');
                        if(badge) badge.classList.add('error');
                    }
                    userRow.appendChild(clone);
                });
                board.appendChild(userRow);

                // Solution section
                const solTitle = document.createElement('h3');
                solTitle.textContent = 'Solution :';
                solTitle.style.margin = '0 0 10px 0';
                board.appendChild(solTitle);

                const solRow = document.createElement('div');
                solRow.style.display = 'flex';
                solRow.style.gap = '20px';
                solRow.style.flexWrap = 'wrap';
                solRow.style.justifyContent = 'center';

                const items = Array.from(selectionOrder);
                items.sort((a, b) => parseFloat(a.dataset.value) - parseFloat(b.dataset.value));
                
                items.forEach((item, index) => {
                    const clone = item.cloneNode(true);
                    clone.className = `item type-${currentDayConfig.type} selected`; 
                    const badge = clone.querySelector('.badge');
                    if (badge) {
                        badge.textContent = index + 1;
                        badge.className = 'badge'; 
                    }
                    solRow.appendChild(clone);
                });
                board.appendChild(solRow);

                endGame(`Erreur ! Voici la correction.`, false);
            }
        }

        // Wrap up game UI and trigger auto-submit
        function endGame(message, isWin) {
            clearInterval(timerInterval);
            isPaused = true;
            checkBtn.classList.add('hidden');
            startBtn.classList.add('hidden'); // Cannot replay

            // Save completion safely
            try {
                const playedDays = JSON.parse(getStorage('orderix_played_days') || '{}');
                playedDays[currentDayConfig.id] = { count: activeItemCount, time: timeElapsed, isWin: isWin };
                setStorage('orderix_played_days', JSON.stringify(playedDays));
            } catch(e){}

            const timeStr = isWin ? (timeElapsed / 1000).toFixed(3) : "FAIL";
            resultDisplay.innerHTML = `${message}<br>Temps : ${timeStr}${isWin ? ' secondes' : ''}.`;
            resultDisplay.style.color = isWin ? '#28a745' : '#dc3545';

            leaderboardSection.classList.remove('hidden');
            dbMessage.textContent = 'Envoi du score en cours...';
            dbMessage.style.color = '#333';
            
            submitScore(isWin);
        }

        // Network: Auto Submit score
        function submitScore(isWin) {
            let name = playerNameMainInput.value.trim();
            const storedName = getStorage('orderix_player_name');
            if (storedName) name = storedName;
            
            const timeVal = isWin ? (timeElapsed / 1000).toFixed(3) : -1;

            const payload = {
                name: name,
                time: timeVal,
                day: currentDayConfig.id,
                itemCount: activeItemCount
            };

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "error") {
                    if (data.message === "Banned word") {
                        dbMessage.textContent = "Ce nom contient un mot interdit.";
                    } else if (data.message === "Name taken for this config") {
                        dbMessage.textContent = "Score déjà enregistré pour cette difficulté.";
                    } else {
                        dbMessage.textContent = "Erreur serveur.";
                    }
                    dbMessage.style.color = "#dc3545";
                } else {
                    dbMessage.textContent = "Score enregistré avec succès !";
                    dbMessage.style.color = "#28a745";
                }
                fetchLeaderboard();
            })
            .catch(err => {
                dbMessage.textContent = "Erreur de connexion au serveur.";
                dbMessage.style.color = "#dc3545";
                console.error(err);
                fetchLeaderboard();
            });
        }

        // Network: Fetch top 10 (filtered by day AND item count)
        function fetchLeaderboard() {
            leaderboardList.innerHTML = '<li style="padding: 10px; text-align: center;">Chargement...</li>';
            
            const targetUrl = `${GAS_URL}?day=${currentDayConfig.id}&itemCount=${activeItemCount}&nocache=${Date.now()}`;
            
            fetch(targetUrl)
                .then(response => response.json())
                .then(data => {
                    leaderboardList.innerHTML = '';
                    if (data.length === 0) {
                        leaderboardList.innerHTML = '<li style="padding: 10px; text-align: center;">Aucun score pour cette configuration.</li>';
                        return;
                    }
                    data.forEach((entry, index) => {
                        const li = document.createElement('li');
                        li.style.padding = '10px';
                        li.style.borderBottom = '1px solid #eee';
                        li.style.display = 'flex';
                        li.style.justifyContent = 'space-between';
                        
                        let rankStyle = "font-weight: bold;";
                        if (index === 0) rankStyle += " color: gold;";
                        else if (index === 1) rankStyle += " color: silver;";
                        else if (index === 2) rankStyle += " color: #cd7f32;";

                        const timeDisplay = entry.time === -1 ? "FAIL" : `${entry.time.toFixed(3)}s`;
                        const colorStyle = entry.time === -1 ? "color: #dc3545;" : "";

                        li.innerHTML = `
                            <span><span style="${rankStyle}">#${index + 1}</span> ${entry.name}</span>
                            <span style="font-family: monospace; font-weight: bold; ${colorStyle}">${timeDisplay}</span>
                        `;
                        leaderboardList.appendChild(li);
                    });
                })
                .catch(err => {
                    leaderboardList.innerHTML = '<li style="padding: 10px; text-align: center; color: red;">Erreur de chargement.</li>';
                });
        }
    </script>
</body>
