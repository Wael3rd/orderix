<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orderix — Suivi des gameplays (janvier → 10 mars)</title>
<style>
:root{--bleu:#4A6CFA;--bleu2:#3553D1;--pale:#EEF2FF;--encre:#23262F;--gris:#8B90A0;
--fond:#F4F6FA;--carte:#fff;--ligne:#E8EAF1;--or:#F5B227;--vert:#34B871;--rouge:#E0533D;--violet:#8B5CF6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;background:var(--fond);color:var(--encre);padding:18px 12px 60px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:1.5rem;font-weight:900;text-align:center}
h1 b{color:var(--bleu)}
.sub{text-align:center;color:var(--gris);font-size:.85rem;margin:4px 0 14px}
.sub b{color:var(--vert)}
/* filtres + compteurs */
#chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:8px 16px;border-radius:999px;background:var(--carte);border:1.5px solid var(--ligne);
font-weight:700;font-size:.8rem;color:var(--gris);cursor:pointer;user-select:none}
.chip.on{background:var(--bleu);border-color:var(--bleu);color:#fff}
.chip .n{opacity:.75;font-weight:900}
/* barre outils */
#bar{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:16px;font-size:.78rem;color:var(--gris)}
#refresh{padding:8px 18px;border-radius:999px;border:none;background:var(--pale);color:var(--bleu2);
font-weight:900;font-size:.8rem;cursor:pointer}
/* cartes jour */
.day{background:var(--carte);border-radius:14px;box-shadow:0 1px 3px rgba(35,38,47,.07);
padding:14px 16px;margin-bottom:10px;display:grid;grid-template-columns:52px 1fr auto;gap:4px 14px;align-items:start}
.num{grid-row:span 3;width:52px;height:52px;border-radius:12px;background:var(--pale);color:var(--bleu2);
display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900}
.num small{font-size:.55rem;letter-spacing:.08em;color:var(--gris);font-weight:700}
.num span{font-size:1.15rem}
.t{font-weight:900;font-size:1.02rem}
.t .genre{font-weight:500;color:var(--gris);font-size:.78rem}
.badge{justify-self:end;padding:5px 12px;border-radius:999px;font-weight:900;font-size:.7rem;
letter-spacing:.05em;white-space:nowrap}
.b-valide{background:#E3F7ED;color:#1E7A4A}
.b-corrige{background:#FFF6E3;color:#B07E0A}
.b-nouveau{background:#EEF2FF;color:var(--bleu2)}
.b-aucun{background:#E8EAF1;color:var(--gris)}
.b-ouvert{background:#FCE9E5;color:#A93A29}
.b-recent{background:#F2E7FB;color:#7A3AA9}
.b-chantier{background:#FFEDD9;color:#B45309}
.b-remplacer{background:#E0533D;color:#fff}
.note{grid-column:2/4;font-size:.8rem;color:var(--gris);line-height:1.4}
.fb{grid-column:2/4;background:var(--fond);border-radius:10px;padding:9px 12px;font-size:.85rem;line-height:1.45}
.fb .meta{font-size:.7rem;font-weight:700;color:var(--gris);margin-bottom:3px}
.fb .meta a{color:var(--bleu2);text-decoration:none}
.fb .meta .ok{color:var(--vert)} .fb .meta .ko{color:var(--rouge)}
.fb.empty{color:#B9BDC9;font-style:italic}
#status{text-align:center;color:var(--gris);font-size:.8rem;padding:20px}
@media(max-width:560px){.day{grid-template-columns:44px 1fr}.badge{grid-column:2;justify-self:start;margin-top:2px}
.note,.fb{grid-column:1/3}.num{grid-row:span 1;width:44px;height:44px}}
</style>
</head>

const LAST_CURATED_ISSUE = 113; // dernier retour intégré à la base curée ci-dessus
const BADGES = {
  valide:    ['b-valide', '✅ Validé'],
  corrige:   ['b-corrige', '🔧 Corrigé — à re-tester'],
  nouveau:   ['b-nouveau', '🆕 Nouveau — à tester'],
  aucun:     ['b-aucun', '❓ Sans retour'],
  ouvert:    ['b-ouvert', '🗣 Retour ouvert'],
  recent:    ['b-recent', '💬 Retour récent traité'],
  chantier:  ['b-chantier', '🚧 En chantier'],
  remplacer: ['b-remplacer', '❌ À remplacer'],
  retest:    ['b-corrige', '🧪 Ancien — à re-tester']
};

// Version de la base curée — sert à détecter une page en cache périmée
const SUIVI_VERSION = '2026-07-18-7';

let filter = 'tous';
let issuesByDay = {};

async function fetchIssues() {
  document.getElementById('status') && (document.getElementById('status').textContent = 'Chargement…');
  const out = {};
  try {
    for (let page = 1; page <= 3; page++) {
      const r = await fetch(`https://api.github.com/repos/Wael3rd/orderix/issues?state=all&per_page=100&page=${page}`);
      if (!r.ok) throw new Error('API ' + r.status);
      const list = await r.json();
      list.forEach(i => {
        if (i.pull_request) return;
        const m = (i.title || '').match(/Jour\s+(\d+)/i);
        if (!m) return;
        const d = parseInt(m[1]);
        if (!out[d] || i.number > out[d].number) {
          const body = i.body || '';
          const cm = body.match(/\*\*Commentaire\*\*\s*:\s*([\s\S]+?)\s*_Envoy/);
          const rm = body.match(/\*\*R[ée]sultat\*\*\s*:\s*(.+?)\s*\*\*/);
          const vm = body.match(/\*\*Verdict\*\*\s*:\s*(.+)/);
          let verdict = null;
          if (vm) {
            if (/VALID/i.test(vm[1])) verdict = 'valide';
            else if (/MODIF/i.test(vm[1])) verdict = 'modifier';
            else if (/REMPLA/i.test(vm[1])) verdict = 'remplacer';
          }
          out[d] = {
            number: i.number, state: i.state, url: i.html_url,
            comment: cm ? cm[1].trim().replace(/\s+/g, ' ') : '(commentaire non lisible)',
            result: rm ? rm[1].trim() : '?',
            verdict: verdict,
            date: (i.created_at || '').slice(0, 10)
          };
        }
      });
      if (list.length < 100) break;
    }
    issuesByDay = out;
    document.getElementById('last-sync').textContent = 'à jour · ' + new Date().toLocaleTimeString('fr-FR');
  } catch (e) {
    document.getElementById('last-sync').textContent = 'GitHub injoignable (' + e.message + ') — données locales';
  }
  render();
}

function statusOf(day) {
  const iss = issuesByDay[day.d];
  // Seuls les retours POSTÉRIEURS à la base curée changent le badge.
  // Le VERDICT envoyé depuis l'app prime : « Validé » s'affiche en vert
  // immédiatement, même si l'issue est encore ouverte.
  if (iss && iss.number > LAST_CURATED_ISSUE) {
    if (iss.verdict === 'valide') return 'valide';
    if (iss.verdict === 'remplacer') return 'remplacer';
    return iss.state === 'open' ? 'ouvert' : 'recent';
  }
  return day.s;
}

function render() {
  const counts = { tous: DAYS.length };
  DAYS.forEach(x => { const s = statusOf(x); counts[s] = (counts[s] || 0) + 1; });

  const chips = [['tous', 'Tous'], ['valide', '✅ Validés'], ['corrige', '🔧 À re-tester'],
    ['retest', '🧪 Anciens'], ['nouveau', '🆕 Nouveaux'], ['chantier', '🚧 En chantier'],
    ['remplacer', '❌ À remplacer'], ['aucun', '❓ Sans retour'], ['ouvert', '🗣 Ouverts'],
    ['recent', '💬 Récents']];
  document.getElementById('chips').innerHTML = chips
    .filter(([k]) => k === 'tous' || counts[k])
    .map(([k, lbl]) => `<span class="chip ${filter === k ? 'on' : ''}" onclick="filter='${k}';render()">${lbl} <span class="n">${counts[k] || 0}</span></span>`)
    .join('');

  const list = document.getElementById('list');
  list.innerHTML = '';
  DAYS.forEach(day => {
    const s = statusOf(day);
    if (filter !== 'tous' && s !== filter) return;
    const iss = issuesByDay[day.d];
    const [cls, lbl] = BADGES[s];

    const el = document.createElement('div');
    el.className = 'day';
    const fb = iss
      ? `<div class="fb"><div class="meta">Dernier retour reçu (historique) :
           <a href="${iss.url}" target="_blank">#${iss.number}</a> · ${iss.date} ·
           ${iss.verdict ? ({ valide: '✅ Validé', modifier: '🔧 À modifier', remplacer: '❌ Remplacer' })[iss.verdict] + ' · ' : ''}
           <span class="${/réussi/i.test(iss.result) ? 'ok' : 'ko'}">${iss.result}</span> ·
           ${iss.state === 'open' ? '🟠 ouverte — pas encore traité' : '⚪ fermée — traité'}</div>
           « ${iss.comment} »</div>`
      : `<div class="fb empty">Aucun commentaire reçu pour ce jour.</div>`;
    el.innerHTML = `
      <div class="num"><small>JOUR</small><span>${day.d}</span></div>
      <div class="t">${day.n} <span class="genre">· ${day.g}</span></div>
      <span class="badge ${cls}">${lbl}</span>
      <div class="note">${day.note}</div>
      ${fb}`;
    list.appendChild(el);
  });
  if (!list.children.length) list.innerHTML = '<div id="status">Rien dans ce filtre.</div>';
}

document.getElementById('refresh').addEventListener('click', fetchIssues);
setInterval(fetchIssues, 5 * 60 * 1000);
render();
fetchIssues();

// ── Anti-cache : GitHub Pages sert la page avec 10 min de cache et le
// navigateur du téléphone peut garder une version périmée bien plus
// longtemps. Au chargement, on re-télécharge la page en contournant le
// cache ; si sa version diffère, on recharge sur une URL horodatée.
(async function verifFraicheur() {
  try {
    const r = await fetch(location.pathname + '?nc=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return;
    const m = (await r.text()).match(/SUIVI_VERSION = '([^']+)'/);
    if (m && m[1] !== SUIVI_VERSION) {
      document.getElementById('last-sync').textContent = 'nouvelle version détectée — rechargement…';
      location.replace(location.pathname + '?v=' + encodeURIComponent(m[1]));
    }
  } catch (e) { /* hors-ligne : on garde la version affichée */ }
})();
</script>
