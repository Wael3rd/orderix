<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="90%">
      <stop offset="0%" stop-color="#5B7BFB"/>
      <stop offset="60%" stop-color="#4A6CFA"/>
      <stop offset="100%" stop-color="#3553D1"/>
    </radialGradient>
  </defs>

  <!-- Fond bleu signature -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Filet supérieur -->
  <line x1="312" y1="200" x2="472" y2="200" stroke="#FFFFFF" stroke-opacity=".55" stroke-width="10" stroke-linecap="round"/>
  <rect x="496" y="184" width="32" height="32" rx="6" fill="#F5B227" transform="rotate(45 512 200)"/>
  <line x1="552" y1="200" x2="712" y2="200" stroke="#FFFFFF" stroke-opacity=".55" stroke-width="10" stroke-linecap="round"/>

  <!-- Motif de tri : 3 pastilles croissantes -->
  <circle cx="248" cy="588" r="56"  fill="#FFFFFF" fill-opacity=".35"/>
  <circle cx="420" cy="568" r="84"  fill="#FFFFFF" fill-opacity=".6"/>
  <circle cx="624" cy="540" r="112" fill="#FFFFFF" fill-opacity=".85"/>

  <!-- Grande pastille or avec coche -->
  <circle cx="800" cy="508" r="142" fill="#F5B227"/>
  <path d="M 736 508 L 784 558 L 868 458" fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Filet inférieur -->
  <line x1="312" y1="824" x2="712" y2="824" stroke="#FFFFFF" stroke-opacity=".35" stroke-width="10" stroke-linecap="round"/>
</svg>
