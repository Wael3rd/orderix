<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orderix — style Tripledot, mise en page SNG</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Style graphique : Tripledot/Woodoku (bois chaud, plateau crème,
   reliefs tactiles, verts feuille) — Mise en page : copie EXACTE du
   mockup SNG (HUD social, table encadrée, bandeau, tuiles, classement
   des amies, 4 onglets). ── */
:root{
  --bois:#A97B4F; --bois-fonce:#7C5633; --bois-clair:#C99B6B; --bois-noir:#5E3F23;
  --plateau:#F6ECD9; --case:#EBDCC0; --encre:#5A3E26; --doux:#9A7B5C;
  --feuille:#7FA85C; --feuille-fonce:#5F8540; --feuille-noire:#46622E;
  --braise:#E2853C; --braise-fonce:#B5601C; --creme:#FFF4DF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;color:var(--creme);min-height:100vh;
  background:
    repeating-linear-gradient(92deg, rgba(124,86,51,.10) 0 3px, transparent 3px 26px),
    repeating-linear-gradient(88deg, rgba(255,235,200,.06) 0 2px, transparent 2px 17px),
    linear-gradient(170deg,#B8895C, #9C6F44 60%, #8A5F38);
}
.phone{max-width:520px;margin:0 auto;padding:16px 16px 116px}
/* barre de statut joueuse (layout SNG) */
.hud{display:flex;align-items:center;gap:8px}
.avatar{width:46px;height:46px;border-radius:50%;border:3px solid var(--feuille);
  background:linear-gradient(180deg,#E9C29B,#C99B6B);display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  box-shadow:0 3px 0 var(--feuille-noire)}
.hud .lvl{font-size:.72rem;font-weight:900;color:#DFF0C8;text-shadow:0 1px 0 rgba(70,50,25,.5)}
.hud .nom{font-weight:900;font-size:.95rem;text-shadow:0 1px 0 rgba(70,50,25,.5)}
.pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--plateau);
  border-radius:999px;padding:6px 14px 6px 8px;font-weight:900;font-size:.9rem;color:var(--encre);
  box-shadow:0 4px 0 #D9C5A0, inset 0 1px 0 #FFFDF6}
.coin{width:22px;height:22px;border-radius:6px;background:linear-gradient(180deg,#D9A368,#C08A4E);
  box-shadow:inset 0 2px 0 #F0C896, 0 1px 0 #93642F}
.plus{width:20px;height:20px;border-radius:6px;background:linear-gradient(180deg,#94BA6C,var(--feuille-fonce));
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;
  box-shadow:0 2px 0 var(--feuille-noire)}
h1{font-family:'Fredoka',sans-serif;font-weight:700;text-align:center;font-size:3rem;letter-spacing:.03em;margin-top:14px;
  color:var(--creme);text-shadow:0 3.5px 0 var(--bois-fonce), 0 10px 18px rgba(60,38,16,.4)}
.date{text-align:center;font-weight:900;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:#F4E3C8;
  text-shadow:0 1px 0 rgba(60,38,16,.4)}
/* table encadrée bois (layout SNG, matière Woodoku) */
.table{
  margin-top:14px;border-radius:26px;padding:8px;
  background:linear-gradient(180deg,var(--bois-clair),var(--bois) 40%,var(--bois-noir));
  box-shadow:0 10px 0 #4A3015, 0 26px 44px rgba(60,38,16,.45), inset 0 2px 0 rgba(255,240,210,.5);
}
.table-in{
  border-radius:20px;padding:22px 18px;text-align:center;color:var(--encre);
  background:var(--plateau);
  box-shadow:inset 0 4px 12px rgba(124,86,51,.35), inset 0 -2px 0 #FFFDF6;
}
.banner{
  margin:-34px auto 8px;width:fit-content;padding:8px 30px;border-radius:14px;position:relative;
  background:linear-gradient(180deg,#94BA6C,var(--feuille-fonce));
  box-shadow:0 5px 0 var(--feuille-noire), 0 12px 18px rgba(60,38,16,.35), inset 0 2px 0 #C9E5A8;
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;
  color:#FFFDF4;text-shadow:0 1.5px 0 var(--feuille-noire);
}
.num{font-family:'Fredoka',sans-serif;font-weight:700;font-size:4.2rem;line-height:1;color:var(--encre);
  text-shadow:0 3px 0 rgba(255,253,246,.9), 0 5px 0 rgba(124,86,51,.18)}
.num small{font-size:1.1rem;color:var(--doux)}
.mode{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1.6rem;letter-spacing:.04em;color:var(--braise);margin-top:6px;
  text-shadow:0 1.5px 0 rgba(255,253,246,.8)}
.theme{font-weight:800;font-size:.9rem;color:var(--doux)}
/* tuiles (layout SNG) en blocs de bois (matière Woodoku) */
.tiles{display:flex;gap:6px;justify-content:center;margin-top:14px}
.tile{width:38px;height:52px;border-radius:8px;background:linear-gradient(180deg,#D9A368,#C08A4E);
  color:#FFF4DF;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.3rem;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 #93642F, 0 8px 12px rgba(60,38,16,.3), inset 0 2px 0 #F0C896;
  text-shadow:0 1.5px 0 #93642F}
.tile.g{background:linear-gradient(180deg,#9CC274,var(--feuille));box-shadow:0 4px 0 #54743A, 0 8px 12px rgba(60,38,16,.3), inset 0 2px 0 #C4E0A4;text-shadow:0 1.5px 0 #54743A}
.cta{
  display:inline-block;margin-top:20px;padding:15px 52px;border:none;border-radius:18px;
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:.08em;color:#FFFDF4;
  background:linear-gradient(180deg,#94BA6C,var(--feuille-fonce));
  box-shadow:0 6px 0 var(--feuille-noire), 0 16px 26px rgba(60,38,16,.35), inset 0 2px 0 #C9E5A8;
  text-shadow:0 2px 0 var(--feuille-noire);
}
/* classement social (layout SNG, matière Woodoku) */
.lead{margin-top:16px;border-radius:18px;background:var(--plateau);padding:12px 14px;color:var(--encre);
  box-shadow:0 6px 0 #D9C5A0, 0 14px 22px rgba(60,38,16,.3), inset 0 2px 0 #FFFDF6}
.lead .lt{font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;letter-spacing:.08em;color:var(--bois-fonce);
  text-transform:uppercase;margin-bottom:8px;text-align:center}
.lrow{display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1.5px solid var(--case);font-weight:800;font-size:.92rem}
.lrow:last-child{border-bottom:none}
.lrow .rk{font-family:'Fredoka',sans-serif;font-weight:700;width:22px;color:var(--braise)}
.lrow .av{width:32px;height:32px;border-radius:50%;border:2px solid var(--feuille);background:linear-gradient(180deg,#E9C29B,#C99B6B);
  display:flex;align-items:center;justify-content:center;font-size:.95rem}
.lrow .sc{margin-left:auto;color:var(--feuille-fonce)}
.lrow.me{background:#EFE3CA;border-radius:10px}
/* barre d'onglets 4 entrées (layout SNG, matière Woodoku) */
.tabbar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  width:min(380px,calc(100% - 40px));display:flex;padding:7px;border-radius:22px;
  background:linear-gradient(180deg,var(--bois-clair),var(--bois));
  box-shadow:0 6px 0 var(--bois-fonce), 0 18px 30px rgba(60,38,16,.45), inset 0 2px 0 rgba(255,240,210,.4);
}
.tab{flex:1;text-align:center;padding:9px 0;border-radius:15px;color:#F4E3C8;font-weight:800;font-size:.66rem;
  letter-spacing:.08em;text-transform:uppercase;text-shadow:0 1px 0 rgba(60,38,16,.4)}
.tab span{display:block;font-size:1.15rem}
.tab.on{background:var(--plateau);color:var(--encre);text-shadow:none;box-shadow:inset 0 2px 4px rgba(124,86,51,.3)}
</style>
</head>
<body>
<div class="phone">
  <div class="hud">
    <div class="avatar">👩</div>
    <div><div class="nom">Nadia</div><div class="lvl">NIVEAU 12 🌿</div></div>
    <div class="pill"><div class="coin"></div>12 450 <div class="plus">+</div></div>
  </div>

  <h1>Orderix</h1>
  <p class="date">Vendredi 12 juin</p>

  <div class="table">
    <div class="table-in">
      <div class="banner">Puzzle du jour</div>
      <div class="num">163<small> / 365</small></div>
      <p class="mode">Monde Miroir</p>
      <p class="theme">Thème : WiFi · ×2 glands aujourd'hui !</p>
      <div class="tiles">
        <div class="tile">1</div><div class="tile g">6</div><div class="tile">3</div><div class="tile g">9</div>
      </div>
      <button class="cta">Jouer</button>
    </div>
  </div>

  <div class="lead">
    <div class="lt">— Classement des amies —</div>
    <div class="lrow"><span class="rk">1</span><span class="av">👩‍🦰</span> Sophie <span class="sc">1,42 s</span></div>
    <div class="lrow me"><span class="rk">2</span><span class="av">👩</span> Nadia (vous) <span class="sc">1,80 s</span></div>
    <div class="lrow"><span class="rk">3</span><span class="av">👱‍♀️</span> Mireille <span class="sc">2,07 s</span></div>
  </div>

  <nav class="tabbar">
    <div class="tab on"><span>🌿</span>Jour</div>
    <div class="tab"><span>🗓</span>Année</div>
    <div class="tab"><span>🏆</span>Ligue</div>
    <div class="tab"><span>👥</span>Amies</div>
  </nav>
</div>
</body>
</html>
