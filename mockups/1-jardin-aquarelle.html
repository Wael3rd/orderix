<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orderix — Jardin d'aquarelle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EDF2EB; --card:#FDFEFC; --ink:#3A4A3E; --ink2:#71826F;
  --euca:#6F8F7C; --euca-deep:#52705F; --petale:#D89B94; --petale-deep:#BE7A72;
  --soleil:#D9B86A; --ligne:#DCE5D8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito Sans',sans-serif; color:var(--ink); background:var(--bg);
  background-image:
    radial-gradient(60% 38% at 12% 4%, rgba(111,143,124,.18), transparent 70%),
    radial-gradient(50% 32% at 95% 14%, rgba(216,155,148,.20), transparent 70%),
    radial-gradient(55% 30% at 50% 102%, rgba(217,184,106,.14), transparent 70%);
  min-height:100vh;
}
.phone{max-width:520px;margin:0 auto;padding:30px 22px 120px;position:relative;overflow:hidden}
/* branches d'eucalyptus */
.leafTL,.leafBR{position:absolute;opacity:.5;pointer-events:none}
.leafTL{top:-12px;left:-16px;transform:rotate(15deg)}
.leafBR{bottom:90px;right:-22px;transform:rotate(195deg)}
.date{font-size:.78rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--euca-deep);text-align:center}
h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:3.4rem;text-align:center;color:var(--ink);line-height:1.05;margin-top:2px}
h1 em{color:var(--petale-deep);font-style:italic;font-weight:500}
.tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem;text-align:center;color:var(--ink2)}
.sprig{display:flex;justify-content:center;gap:6px;margin:12px 0 4px;color:var(--euca)}
.sprig i{width:9px;height:14px;background:var(--euca);border-radius:50% 50% 50% 0;display:inline-block;opacity:.7}
.sprig i:nth-child(2){transform:rotate(40deg);opacity:.9}
.sprig i:nth-child(3){transform:rotate(80deg);opacity:.55}
.card{
  background:var(--card);border:1.5px solid var(--ligne);
  border-radius:34px 26px 38px 26px;
  box-shadow:0 18px 40px rgba(82,112,95,.13);
  padding:30px 24px;margin-top:20px;text-align:center;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;inset:auto -40px -70px auto;width:190px;height:190px;border-radius:46% 54% 60% 40%;background:radial-gradient(circle at 30% 30%, rgba(216,155,148,.25), rgba(216,155,148,.05));}
.kicker{font-size:.74rem;font-weight:800;letter-spacing:.26em;text-transform:uppercase;color:var(--ink2)}
.num{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:4.8rem;color:var(--euca-deep);line-height:1;margin:10px 0 0}
.num small{font-size:1.1rem;color:var(--ink2);font-weight:600}
.mode{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:1.6rem;margin-top:10px}
.theme{color:var(--ink2);font-size:.95rem}
.cta{
  display:inline-block;margin-top:22px;padding:16px 36px;border-radius:999px;border:none;
  font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:1.05rem;color:#FBFDF9;
  background:linear-gradient(150deg,var(--euca),var(--euca-deep));
  box-shadow:0 10px 22px rgba(82,112,95,.4);
}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.stat{background:rgba(253,254,252,.8);border:1.5px solid var(--ligne);border-radius:22px 16px 22px 16px;text-align:center;padding:14px 4px}
.stat b{display:block;font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--petale-deep)}
.stat label{font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)}
.explore{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1.5px solid var(--ligne);border-radius:26px;box-shadow:0 10px 24px rgba(82,112,95,.10);padding:18px 22px;margin-top:14px}
.explore .t{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.25rem}
.explore .s{font-size:.85rem;color:var(--ink2)}
.explore .a{width:40px;height:40px;border-radius:50%;background:var(--petale);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.tabbar{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  width:min(370px,calc(100% - 48px));display:flex;padding:8px;
  background:rgba(253,254,252,.9);backdrop-filter:blur(12px);
  border:1.5px solid var(--ligne);border-radius:999px;box-shadow:0 14px 32px rgba(58,74,62,.18);
}
.tab{flex:1;text-align:center;padding:10px 0;border-radius:999px;font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.tab.on{background:var(--euca);color:#F4F8F2}
.tab span{display:block;font-size:1.05rem;margin-bottom:1px}
</style>
</head>
<body>
<div class="phone">
  <svg class="leafTL" width="150" height="150" viewBox="0 0 100 100"><path d="M10 90 Q30 40 80 12" fill="none" stroke="#6F8F7C" stroke-width="2.5"/><g fill="#6F8F7C"><ellipse cx="26" cy="62" rx="5" ry="11" transform="rotate(-35 26 62)"/><ellipse cx="40" cy="44" rx="5" ry="11" transform="rotate(-25 40 44)"/><ellipse cx="58" cy="29" rx="5" ry="11" transform="rotate(-15 58 29)"/><ellipse cx="74" cy="18" rx="4" ry="9" transform="rotate(-5 74 18)"/></g></svg>
  <p class="date">Vendredi 12 juin</p>
  <h1>Order<em>ix</em></h1>
  <p class="tagline">Cultivez votre esprit, un jour à la fois</p>
  <div class="sprig"><i></i><i></i><i></i></div>

  <div class="card">
    <p class="kicker">Puzzle du jour</p>
    <div class="num">163<small> / 365</small></div>
    <p class="mode">Monde Miroir</p>
    <p class="theme">Thème : WiFi</p>
    <button class="cta">Jouer le puzzle du jour</button>
  </div>

  <div class="stats">
    <div class="stat"><b>4</b><label>en série</label></div>
    <div class="stat"><b>27</b><label>réussis</label></div>
    <div class="stat"><b>1,8s</b><label>record</label></div>
  </div>

  <div class="explore">
    <div><div class="t">Explorer l'année</div><div class="s">365 puzzles, un par jour</div></div>
    <div class="a">→</div>
  </div>

  <svg class="leafBR" width="150" height="150" viewBox="0 0 100 100"><path d="M10 90 Q30 40 80 12" fill="none" stroke="#D89B94" stroke-width="2.5"/><g fill="#D89B94"><ellipse cx="26" cy="62" rx="5" ry="11" transform="rotate(-35 26 62)"/><ellipse cx="40" cy="44" rx="5" ry="11" transform="rotate(-25 40 44)"/><ellipse cx="58" cy="29" rx="5" ry="11" transform="rotate(-15 58 29)"/></g></svg>

  <nav class="tabbar">
    <div class="tab on"><span>❀</span>Jour</div>
    <div class="tab"><span>✿</span>Année</div>
    <div class="tab"><span>❁</span>Profil</div>
  </nav>
</div>
</body>
</html>
