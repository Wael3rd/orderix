<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orderix — style SNG</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Pastiche SNG Studios (101 Okey Plus / Okey Plus) ──
   Table en feutrine verte, cadre bois, or et rouge, boutons glossy,
   couche sociale bien visible : avatars, classement, pièces. ── */
:root{
  --feutre:#1C6B43; --feutre-fonce:#114D2F; --bois:#6B4226; --bois-fonce:#4A2C17;
  --or:#F4C44E; --or-fonce:#C8932A; --rouge:#D8472F; --rouge-fonce:#A82F1C;
  --creme:#FFF6DF; --encre:#2E1B0E;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;color:var(--creme);min-height:100vh;
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.10), transparent 55%),
    repeating-radial-gradient(circle at 50% 30%, rgba(0,0,0,.05) 0 2px, transparent 2px 5px),
    linear-gradient(175deg, #258355, var(--feutre) 45%, var(--feutre-fonce));
}
.phone{max-width:520px;margin:0 auto;padding:16px 16px 116px}
/* barre de statut joueur */
.hud{display:flex;align-items:center;gap:8px}
.avatar{width:46px;height:46px;border-radius:50%;border:3px solid var(--or);
  background:linear-gradient(180deg,#E9A06B,#C97B45);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.hud .lvl{font-size:.72rem;font-weight:900;color:var(--or)}
.hud .nom{font-weight:900;font-size:.95rem;text-shadow:0 1px 0 rgba(0,0,0,.4)}
.pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);
  border:2px solid var(--or-fonce);border-radius:999px;padding:6px 14px 6px 8px;font-weight:900;font-size:.9rem}
.coin{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE9A8,var(--or) 55%,var(--or-fonce));
  box-shadow:inset 0 -2px 2px rgba(0,0,0,.3)}
.plus{width:20px;height:20px;border-radius:6px;background:var(--rouge);display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:.9rem;box-shadow:0 2px 0 var(--rouge-fonce)}
h1{font-family:'Lilita One',cursive;text-align:center;font-size:3rem;letter-spacing:.03em;margin-top:14px;
  color:var(--or);text-shadow:0 3px 0 var(--or-fonce), 0 8px 16px rgba(0,0,0,.45)}
.date{text-align:center;font-weight:900;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;opacity:.85}
/* table encadrée bois */
.table{
  margin-top:14px;border-radius:26px;padding:8px;
  background:linear-gradient(180deg,#8A5A35,var(--bois) 40%,var(--bois-fonce));
  box-shadow:0 10px 0 #341E0E, 0 26px 44px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,220,170,.5);
}
.table-in{
  border-radius:20px;padding:22px 18px;text-align:center;
  background:
    repeating-radial-gradient(circle at 50% 20%, rgba(0,0,0,.04) 0 2px, transparent 2px 5px),
    linear-gradient(180deg,#27865A,#19613C);
  box-shadow:inset 0 4px 14px rgba(0,0,0,.45);
}
.banner{
  margin:-34px auto 8px;width:fit-content;padding:8px 30px;border-radius:12px;position:relative;
  background:linear-gradient(180deg,#E8593F,var(--rouge));
  box-shadow:0 4px 0 var(--rouge-fonce), 0 10px 18px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,200,170,.5);
  font-family:'Lilita One',cursive;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;
  text-shadow:0 2px 0 var(--rouge-fonce);
}
.num{font-family:'Lilita One',cursive;font-size:4.2rem;line-height:1;color:#fff;
  text-shadow:0 4px 0 rgba(0,0,0,.35)}
.num small{font-size:1.1rem;color:var(--or)}
.mode{font-family:'Lilita One',cursive;font-size:1.6rem;letter-spacing:.04em;color:var(--or);margin-top:6px;
  text-shadow:0 2px 0 rgba(0,0,0,.4)}
.theme{font-weight:800;font-size:.9rem;opacity:.85}
/* tuiles okey décoratives */
.tiles{display:flex;gap:6px;justify-content:center;margin-top:14px}
.tile{width:38px;height:52px;border-radius:7px;background:linear-gradient(180deg,#FFFDF4,#EFE3C8);
  color:var(--rouge);font-family:'Lilita One',cursive;font-size:1.3rem;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 0 #C9B68C, 0 8px 12px rgba(0,0,0,.35)}
.tile.n{color:#1A4FA0}.tile.k{color:#222}
.cta{
  display:inline-block;margin-top:20px;padding:15px 52px;border:none;border-radius:16px;
  font-family:'Lilita One',cursive;font-size:1.5rem;letter-spacing:.08em;color:#5C3A00;
  background:linear-gradient(180deg,#FFE08A,var(--or) 55%,var(--or-fonce));
  box-shadow:0 6px 0 #96690F, 0 16px 26px rgba(0,0,0,.45), inset 0 2px 0 #FFF2C4;
  text-shadow:0 1px 0 #FFE9A8;
}
/* classement social */
.lead{margin-top:16px;border-radius:18px;background:rgba(0,0,0,.30);border:2px solid rgba(244,196,78,.4);padding:12px 14px}
.lead .lt{font-family:'Lilita One',cursive;font-size:1rem;letter-spacing:.08em;color:var(--or);text-transform:uppercase;margin-bottom:8px;text-align:center}
.lrow{display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,.08);font-weight:800;font-size:.92rem}
.lrow:last-child{border-bottom:none}
.lrow .rk{font-family:'Lilita One',cursive;width:22px;color:var(--or)}
.lrow .av{width:32px;height:32px;border-radius:50%;border:2px solid var(--or);background:linear-gradient(180deg,#C9A0E9,#9B6BC9);display:flex;align-items:center;justify-content:center;font-size:.95rem}
.lrow .sc{margin-left:auto;color:var(--or)}
.lrow.me{background:rgba(244,196,78,.15);border-radius:10px}
.tabbar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  width:min(380px,calc(100% - 40px));display:flex;padding:7px;border-radius:20px;
  background:linear-gradient(180deg,#8A5A35,var(--bois-fonce));
  box-shadow:0 7px 0 #341E0E, 0 18px 30px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,220,170,.4);
}
.tab{flex:1;text-align:center;padding:9px 0;border-radius:14px;color:#E8CFA8;font-weight:900;font-size:.66rem;
  letter-spacing:.08em;text-transform:uppercase}
.tab span{display:block;font-size:1.15rem}
.tab.on{background:linear-gradient(180deg,#FFE08A,var(--or));color:#5C3A00;box-shadow:0 3px 0 #96690F}
</style>
</head>
<body>
<div class="phone">
  <div class="hud">
    <div class="avatar">👩</div>
    <div><div class="nom">Nadia</div><div class="lvl">NIVEAU 12 ★</div></div>
    <div class="pill"><div class="coin"></div>12 450 <div class="plus">+</div></div>
  </div>

  <h1>ORDERIX</h1>
  <p class="date">Vendredi 12 juin</p>

  <div class="table">
    <div class="table-in">
      <div class="banner">Puzzle du jour</div>
      <div class="num">163<small> / 365</small></div>
      <p class="mode">MONDE MIROIR</p>
      <p class="theme">Thème : WiFi · ×2 pièces aujourd'hui !</p>
      <div class="tiles">
        <div class="tile">1</div><div class="tile n">6</div><div class="tile k">3</div><div class="tile">9</div>
      </div>
      <button class="cta">JOUER</button>
    </div>
  </div>

  <div class="lead">
    <div class="lt">— Classement des amies —</div>
    <div class="lrow"><span class="rk">1</span><span class="av">👩‍🦰</span> Sophie <span class="sc">1,42 s</span></div>
    <div class="lrow me"><span class="rk">2</span><span class="av">👩</span> Nadia (vous) <span class="sc">1,80 s</span></div>
    <div class="lrow"><span class="rk">3</span><span class="av">👱‍♀️</span> Mireille <span class="sc">2,07 s</span></div>
  </div>

  <nav class="tabbar">
    <div class="tab on"><span>🎲</span>Jour</div>
    <div class="tab"><span>🗓</span>Année</div>
    <div class="tab"><span>🏆</span>Ligue</div>
    <div class="tab"><span>👥</span>Amies</div>
  </nav>
</div>
</body>
</html>
