<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orderix</title>
    <style>
        /* Layout styling - Natural document flow */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
            background-color: #f4f4f9;
        }

        #sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            flex-shrink: 0;
            overflow-y: auto;
            max-height: 100vh;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            box-sizing: border-box;
            width: 100%;
            overflow-x: hidden;
        }

        /* Sidebar UI */
        #sidebar h3 {
            margin: 0 0 10px 0;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            font-size: 1.2rem;
        }

        .day-btn {
            background-color: #495057;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            text-align: left;
            transition: background 0.2s;
            font-size: 1rem;
        }

        .day-btn:hover {
            background-color: #6c757d;
        }

        .day-btn.active {
            background-color: #007bff;
            font-weight: bold;
            border-left: 5px solid #80bdff;
        }

        .day-btn .tick {
            color: #28a745;
            margin-left: 6px;
            font-weight: bold;
        }

        .day-btn .tick.fail {
            color: #dc3545;
        }

        .loader {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 10px;
            color: #adb5bd;
            font-size: 0.9rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #555;
            border-top-color: #80bdff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 20px;
        }

        .settings-group label {
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .settings-group input {
            padding: 8px;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }

        /* Game UI */
        #game-board {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            min-height: 80px;
        }

        .item {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: #007bff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, border 0.1s;
            user-select: none;
            flex-shrink: 0;
            margin-bottom: 28px;
            /* Prevents double-tap zooming on mobile */
            touch-action: manipulation;
        }



        .item.error {
            box-shadow: 0 0 0 4px #dc3545 !important;
            z-index: 50;
        }

        .item.matched {
            pointer-events: none;
            opacity: 0.6;
        }

        .badge {
            position: absolute;
            bottom: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }

        .badge.error {
            background: #dc3545 !important;
        }

        .badge.top {
            bottom: auto;
            top: -26px;
        }

        .hidden {
            display: none !important;
        }

        #timer-display {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        #button-container {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            font-weight: bold;
        }

        .action-btn:hover {
            background-color: #218838;
        }

        #menu-btn {
            background-color: #dc3545;
        }

        #menu-btn:hover {
            background-color: #c82333;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin: 0 0 10px 0;
            color: #333;
        }

        #level-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
            margin: 0 0 10px 0;
            text-align: center;
        }

        #result {
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
            margin-top: 10px;
            padding: 0 10px;
        }

        /* Generators styling */
        .dots-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding: 5px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            align-content: flex-start;
            justify-content: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }

        .mini-block {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 1px;
        }

        /* Game Modes Animations & Filters */
        @keyframes shrink {
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        @keyframes wobble {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px) rotate(-5deg);
            }

            75% {
                transform: translateX(5px) rotate(5deg);
            }
        }

        @keyframes gravity {
            0% {
                transform: translateY(-50px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @keyframes hue-shift {
            100% {
                filter: hue-rotate(360deg);
            }
        }

        @keyframes dance {

            0%,
            100% {
                transform: translateY(0) rotate(0);
            }

            25% {
                transform: translateY(-10px) rotate(-10deg);
            }

            75% {
                transform: translateY(10px) rotate(10deg);
            }
        }

        .spin-anim {
            animation: spin 2s linear infinite;
        }

        .shrink-anim {
            animation: shrink 12s forwards;
        }

        .flicker-anim {
            animation: flicker 0.3s infinite;
        }

        .pulse-anim {
            animation: pulse 1s infinite;
        }

        .wobble-anim {
            animation: wobble 0.5s infinite;
        }

        .gravity-anim {
            animation: gravity 0.6s ease-out;
        }

        .hue-shift {
            animation: hue-shift 4s linear infinite;
        }

        .dance-anim {
            animation: dance 1.5s infinite;
        }

        .blur-hard {
            filter: blur(4px);
            transition: filter 0.2s;
        }

        .blur-hard:active {
            filter: blur(0);
        }

        .invert-color {
            filter: invert(1);
        }

        .mirror-view {
            transform: scaleX(-1);
        }

        .hide-until-hover {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .hide-until-hover:hover,
        .hide-until-hover:active {
            opacity: 1;
        }

        .peek-hidden {
            background-color: #222 !important;
            color: transparent !important;
            border: 2px solid #555 !important;
            box-shadow: none;
        }

        .peek-hidden * {
            display: none !important;
        }

        .blackout-mode {
            background-color: #000 !important;
        }

        .blackout-mode .item {
            opacity: 0 !important;
            pointer-events: none;
        }

        .cursor-active {
            box-shadow: 0 0 0 6px #ff9800 !important;
            transform: scale(1.15);
            z-index: 100;
            transition: all 0.1s;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                padding: 15px;
                max-height: none;
            }

            #day-buttons-container {
                flex-direction: row !important;
                flex-wrap: wrap;
                justify-content: center;
            }

            .day-btn {
                flex: 1 1 auto;
                min-width: 100px;
                text-align: center;
                font-size: 0.9rem;
                padding: 8px;
            }

            .main-content {
                padding-top: 20px;
            }

            h1 {
                font-size: 1.4rem;
            }

            #level-title {
                font-size: 1rem;
            }

            #timer-display {
                font-size: 2.5rem;
            }

            .action-btn {
                font-size: 1rem;
                padding: 10px 15px;
            }
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h3>Paramètres</h3>
        <div class="settings-group">
            <label>Pseudo :</label>
            <div id="name-input-container" style="display: flex; gap: 5px;">
                <input type="text" id="player-name-main" placeholder="Votre nom" maxlength="15"
                    style="flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <button id="verify-name-btn"
                    style="cursor: pointer; padding: 8px; border: none; background: #007bff; color: white; border-radius: 4px; font-weight: bold;">Valider</button>
            </div>
            <div id="locked-name-display" class="hidden"
                style="padding: 8px; background: #28a745; color: white; border-radius: 4px; font-weight: bold; text-align: center;">
            </div>
            <div id="name-status" style="font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;"></div>
        </div>

        <h3>Jours (365 Niveaux)</h3>
        <div id="day-buttons-container" style="display: flex; flex-direction: column; gap: 8px;">
        </div>
    </div>

    <div class="main-content">
        <h1>ORDERIX : 365 JOURS</h1>
        <h2 id="level-title">Sélectionnez un jour pour commencer</h2>

        <div id="timer-display" class="hidden">0.000</div>

        <div id="button-container">
            <button id="menu-btn" class="action-btn hidden">Retour</button>
            <button id="share-btn" class="action-btn hidden" style="background-color: #17a2b8;">PARTAGE</button>
            <button id="start-btn" class="action-btn hidden">Jouer</button>
            <button id="check-btn" class="action-btn hidden">Valider</button>
        </div>

        <div id="game-board" class="hidden"></div>
        <div id="result"></div>

        <div id="feedback-container" class="hidden"
            style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
            <button id="btn-like" class="action-btn" style="background-color: #28a745;">👍 Top</button>
            <button id="btn-dislike" class="action-btn" style="background-color: #dc3545;">👎 Bof</button>
            <button id="btn-skip" class="action-btn" style="background-color: #6c757d;">Passer</button>
        </div>

        <div id="leaderboard-section" class="hidden"
            style="margin-top: 20px; text-align: center; width: 100%; max-width: 400px;">
            <div id="db-message" style="margin-top: 10px; font-weight: bold;"></div>
            <h3 id="leaderboard-title" style="margin-top: 20px;">Top 10 - Classement</h3>
            <ul id="leaderboard-list"
                style="list-style-type: none; padding: 0; text-align: left; background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <li style="padding: 10px; text-align: center;">Chargement...</li>
            </ul>
        </div>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/generators.js"></script>
    <script src="scripts/styles.js"></script>
    <script src="scripts/modes/reflex.js"></script>
    <script src="scripts/modes/typing.js"></script>
    <script src="scripts/modes/connectDots.js"></script>
    <script src="scripts/modes/mathQuiz.js"></script>
    <script src="scripts/modes/speedLetters.js"></script>
    <script src="scripts/modes/dragDrop.js"></script>
    <script src="scripts/modes/conveyor.js"></script>
    <script src="scripts/modes/speedQuiz.js"></script>
    <script src="scripts/engine.js"></script>
</body>

</html>
