<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orderix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h3>Paramètres</h3>
        <div class="settings-group">
            <label>Pseudo :</label>
            <div id="name-input-container" style="display:flex;gap:5px;">
                <input type="text" id="player-name-main" placeholder="Votre nom" maxlength="15" style="flex-grow:1;padding:8px;border-radius:4px;border:1px solid #ccc;">
                <button id="verify-name-btn" style="cursor:pointer;padding:8px;border:none;background:#007bff;color:white;border-radius:4px;font-weight:bold;">Valider</button>
            </div>
            <div id="locked-name-display" class="hidden" style="padding:8px;background:#28a745;color:white;border-radius:4px;font-weight:bold;text-align:center;"></div>
            <div id="name-status" style="font-size:0.85rem;font-weight:bold;margin-bottom:5px;"></div>
        </div>
        <h3>Jours (365 Niveaux)</h3>
        <div id="day-buttons-container" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <div class="main-content">
        <h1>ORDERIX : 365 JOURS</h1>
        <h2 id="level-title">Sélectionnez un jour pour commencer</h2>
        <div id="timer-display" class="hidden">0.000</div>
        <div id="button-container">
            <button id="menu-btn"  class="action-btn hidden">Retour</button>
            <button id="share-btn" class="action-btn hidden" style="background-color:#17a2b8;">PARTAGE</button>
            <button id="start-btn" class="action-btn hidden">Jouer</button>
            <button id="check-btn" class="action-btn hidden">Valider</button>
        </div>
        <div id="game-board" class="hidden"></div>
        <div id="result"></div>
        <div id="feedback-container" class="hidden" style="display:flex;gap:10px;justify-content:center;margin-top:15px;">
            <button id="btn-like"    class="action-btn" style="background-color:#28a745;">👍 Top</button>
            <button id="btn-dislike" class="action-btn" style="background-color:#dc3545;">👎 Bof</button>
            <button id="btn-skip"    class="action-btn" style="background-color:#6c757d;">Passer</button>
        </div>
        <div id="leaderboard-section" class="hidden" style="margin-top:20px;text-align:center;width:100%;max-width:400px;">
            <div id="db-message" style="margin-top:10px;font-weight:bold;"></div>
            <h3 id="leaderboard-title" style="margin-top:20px;">Top 10 - Classement</h3>
            <ul id="leaderboard-list" style="list-style-type:none;padding:0;text-align:left;background:white;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                <li style="padding:10px;text-align:center;">Chargement...</li>
            </ul>
        </div>
    </div>

    <script type="module" src="js/engine.js"></script>
</body>
</html>
